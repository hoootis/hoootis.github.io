<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>hootis's site</title>
    </head>

    <body>
        <div class="bg-image"></div>

        <div class="container">
            <div class="box" style="top: 30px;
                                    left: calc(); 
                                    animation: slide 1s ease-in-out;
                                    --fromx:-200%;
                                    --fromy:40%;
                                    animation-fill-mode:both;">
                <h1>hello</h1>
                <p>welcome to my site (WIP)</p>
            </div>

            <div class="box" style="top: calc(30px + 250px);
                                    left: calc();
                                    animation: slide 1s ease-in-out; 
                                    --fromx:-200%;
                                    --fromy:40%; 
                                    animation-fill-mode:both;
                                    animation-delay:1s;">
                <h1>i make mods</h1>
                <p>games i make mods for --></p>
            </div>

            <button onclick="location.href = 'modslist.html';" class="box"  style="top: calc(30px + 250px + 250px);
                                        left: calc();
                                        animation: slide 1s ease-in-out; 
                                        --fromx:-200%;
                                        --fromy:40%; 
                                        animation-fill-mode:both;
                                        animation-delay:2s;">
                <h1>click me for a list of my mods</h1>
            </button>
        </div>

        <div class="container">
            <div class="box-filled"  style="top: calc(100% - 50px);
                                            left: 0%">
            contact: @hoootis on discord
            </div>

            <div class="box-filled"  style="top: calc(100% - 50px);
                                            left: calc(0% + 300px)">
            <a href="https://discord.gg/TA24yn9rW9">my discord</a>
            </div>
        </div>

        <div id="text" class="spinning-text"></div>
        <script>
            const str = "Rain World. Terraria. Minecraft."
            const text = document.getElementById("text");
            window.onload = () => {
                for (let i = 0; i < str.length; i++) {
                    let span = document.createElement("span");
                    span.innerHTML = str[i];
                    text.appendChild(span);
                    span.style.transform = `rotate(${11 * i}deg)`
                }
            }
        </script>
    </body>

    <style>
        body {
            font-size: larger;
            font-weight: bold;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background-color: black;

            justify-content: center;
            align-items: center;
        }
        html, body {
            height: 100%;
            width: 100%;
            
            position: fixed;
        }

        a:link {
            color: black;
        }
        a:visited {
            color: black;
        }

        .bg-image {
            background-image: url(bg.gif);
            height: 100%;
            width: 100%;
            z-index: -1;
            filter: blur(5rem);
            -webkit-filter: blur(5rem);

            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;

            clip-path: circle(260px);
        }

        .container {
            z-index: 2;
            padding: 30px;
            width: 100%;
            height: 100%;
        }

        .spinning-text {
            height: 300px;
            width: 300px;
            left: 50%;
            top: 50%;
            position: absolute;
            color: slateblue;
            animation: fade-in 2s linear 2s;
            animation-fill-mode: both;
            z-index: 2;
        }
        span {
            position: absolute;
            left: 0%;
			top: -100%;
            transform-origin: 0 300px;
            font-weight: 800;
            text-transform: capitalize;
            color: slateblue
        }

        .box {
            /*height: var(--h);
            width: var(--w); unused*/
            background-color: rgba(0, 0, 0, 0.527);
            color: white;
            padding: 20px;
            
            /*transform: translate(50%, 50%);*/
            position: absolute;

            border-image: linear-gradient(slateblue, rgba(0, 0, 0, 0)) 30;
            border-width: 10px;
            border-style: solid;
        }
        .box-filled {
            background-color: slateblue;
            padding: 10px;

            position: absolute;

            color: black;
        }

        h1 {
            color: slateblue;
        }

		@keyframes fade-in {
            from {opacity: 0;}
            to {opacity: 100;}
        }
        @keyframes slide {
            0% {background-color: black; transform: translate(var(--fromx), var(--fromy));}
            50% {background-color: rgb(60, 52, 159);}
            100% {background-color: black; transform: translate(var(--tox), var(--toy))}
        }
    </style>
</html>
